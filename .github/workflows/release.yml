name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Test
        run: go test ./...

      - name: Build artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              name="bx_${os}_${arch}"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "dist/$name/bx" .
              tar -C "dist/$name" -czf "dist/$name.tar.gz" bx
              rm -rf "dist/$name"
            done
          done
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
