name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Test
        run: go test ./...

      - name: Build artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          commit="${GITHUB_SHA::12}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/getbx/bx/internal/version.Version=$version -X github.com/getbx/bx/internal/version.Commit=$commit -X github.com/getbx/bx/internal/version.Date=$date"
          for os in linux darwin; do
            for arch in amd64 arm64; do
              name="bx_${os}_${arch}"
              mkdir -p "dist/$name"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="$ldflags" -o "dist/$name/bx" .
              tar -C "dist/$name" -czf "dist/$name.tar.gz" bx
              rm -rf "dist/$name"
            done
          done
          # Windows:PE VersionInfo 覆盖成 tag 版本(与 ldflags 一致),重生成 .syso 后再编;
          # 出 zip(内含 bx.exe,已全内嵌 wintun/sing-box/brook)。
          go run github.com/tc-hib/go-winres@v0.3.3 make --in winres/winres.json --arch amd64,arm64 --out rsrc \
            --product-version "$version" --file-version "$version"
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=windows GOARCH="$arch" go build -trimpath -ldflags="$ldflags" -o "dist/bx.exe" .
            (cd dist && zip -q "bx_windows_${arch}.zip" bx.exe && rm bx.exe)
          done
          # 给下游 installer job 留一份 amd64 exe(不进 release、不进 SHA256SUMS)
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="$ldflags" -o "dist/bx-amd64.exe" .
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Upload windows exe for installer job
        uses: actions/upload-artifact@v4
        with:
          name: bx-windows-amd64-exe
          path: dist/bx-amd64.exe

      - name: Upload generic release files
        uses: actions/upload-artifact@v4
        with:
          name: bx-generic-release
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS

  installer:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download windows exe
        uses: actions/download-artifact@v4
        with:
          name: bx-windows-amd64-exe
          path: dist

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          $v = $version.TrimStart("v")
          $source = (Resolve-Path "dist\bx-amd64.exe").Path
          & iscc "/DMyAppVersion=$v" "/DSourceExe=$source" "packaging\windows\bx-setup.iss"
          Get-ChildItem packaging\windows\Output

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: bx-windows-installer
          path: packaging/windows/Output/bx-setup.exe

  macos-package:
    needs: build
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: amd64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Package macOS release
        run: |
          set -euo pipefail
          version="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          BX_ARCH="${{ matrix.arch }}" BX_VERSION="$version" scripts/package-macos-release.sh
          BX_ARCH="${{ matrix.arch }}" scripts/verify-macos-release.sh

      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: bx-macos-${{ matrix.arch }}
          path: dist/release/bx-macos-${{ matrix.arch }}.tar.gz

  publish:
    needs: [build, installer, macos-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/download-artifact@v4
        with:
          name: bx-generic-release
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: bx-windows-installer
          path: dist

      - uses: actions/download-artifact@v4
        with:
          pattern: bx-macos-*
          path: dist
          merge-multiple: true

      - name: Sign complete update manifest
        env:
          BX_UPDATE_PRIVATE_KEY: ${{ secrets.BX_UPDATE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          version="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          go run ./scripts/sign-update-manifest.go --version "$version" --out dist/bx-update.json \
            --asset linux/amd64:dist/bx_linux_amd64.tar.gz \
            --asset linux/arm64:dist/bx_linux_arm64.tar.gz \
            --asset darwin/amd64:dist/bx_darwin_amd64.tar.gz \
            --asset darwin/arm64:dist/bx_darwin_arm64.tar.gz \
            --package darwin/amd64:dist/bx-macos-amd64.tar.gz \
            --package darwin/arm64:dist/bx-macos-arm64.tar.gz
          cd dist
          sha256sum *.tar.gz *.zip bx-update.json bx-update.json.sig > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
