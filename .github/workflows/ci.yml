name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Test
        run: go test ./...

      - name: Cross build
        run: |
          set -euo pipefail
          for os in linux darwin; do
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -o /dev/null .
            done
          done

      - name: Check workflow YAML
        run: ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |f| YAML.load_file(f); puts f }'

      - name: Check shell scripts
        run: bash -n scripts/darwin-testkit.sh

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      # 门控的 netns 集成测试需 root(unshare CLONE_NEWNET + ip rule/route)。
      # 以 sudo 跑 go 的完整路径;普通 test job 仍跑无 root 单测,互不影响。
      # go test 对 SKIP 也报成功;用 grep 断言 PoC 测试真正跑通(PASS),防止静默 SKIP 蒙混过关。
      - name: Integration tests (netns, root)
        run: |
          set -o pipefail
          sudo "$(which go)" test -tags integration -v ./... | tee /tmp/itest.log
          grep -q -- '--- PASS: TestNetConfRoundTripInNetns' /tmp/itest.log \
            || { echo "::error::netns PoC 未真正运行(被 SKIP?)—— 集成环境可能缺 netns 能力"; exit 1; }
